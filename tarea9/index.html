<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gráfico de Ventas</title>

<link rel="stylesheet" href="estilos.css">

</head>

<body>

<h1>Sistema de Ventas Mensuales</h1>

<div class="container">

<h2>Ingresar Ventas</h2>

<label>Enero</label>
<input type="number" id="enero">

<label>Febrero</label>
<input type="number" id="febrero">

<label>Marzo</label>
<input type="number" id="marzo">

<label>Abril</label>
<input type="number" id="abril">

<label>Mayo</label>
<input type="number" id="mayo">

<label>Junio</label>
<input type="number" id="junio">

<button onclick="generarGrafico()">
Generar Gráfico
</button>

</div>


<div class="grafico-container">

<canvas id="miGrafico"></canvas>

</div>


<!-- LIBRERIA CHART.JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="script.js"></script>

</body>

</html>
