<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Validador de Cédula Dominicana</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0f3c6e,#1e7ed0);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:400px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h1{
margin-bottom:10px;
color:#0f3c6e;
}

p{
color:#555;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin-top:15px;
font-size:18px;
text-align:center;
border:2px solid #ddd;
border-radius:5px;
outline:none;
transition:0.3s;
}

input:focus{
border-color:#1e7ed0;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:5px;
background:#1e7ed0;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0f3c6e;
transform:scale(1.05);
}

button:active{
transform:scale(0.95);
}

.resultado{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

.correcta{
color:green;
}

.incorrecta{
color:red;
}

footer{
margin-top:20px;
font-size:12px;
color:#888;
}

</style>

</head>

<body>

<div class="container">

<h1>Validador de Cédula</h1>

<p>Ingrese una cédula dominicana para verificar si es válida</p>

<input type="text" id="cedula" placeholder="00000000000" maxlength="11">

<button onclick="validarCedula()">Validar</button>

<div id="resultado" class="resultado"></div>

<footer>
Autor: Bryan Benitez Encarnacion
</footer>

</div>

<script>

const inputCedula = document.getElementById("cedula");

inputCedula.addEventListener("input", function(){
validarCedulaTiempoReal();
});

function validarCedula(){

let cedula = document.getElementById("cedula").value;

if(validar(cedula)){
mostrarResultado("CÉDULA CORRECTA",true);
}else{
mostrarResultado("CÉDULA INCORRECTA",false);
}

}

function validarCedulaTiempoReal(){

let cedula = document.getElementById("cedula").value;

if(cedula.length === 11){

if(validar(cedula)){
mostrarResultado("CÉDULA CORRECTA",true);
}else{
mostrarResultado("CÉDULA INCORRECTA",false);
}

}else{
document.getElementById("resultado").innerHTML="";
}

}

function validar(cedula){

if(!/^[0-9]{11}$/.test(cedula)){
return false;
}

let suma = 0;

for(let i=0;i<10;i++){

let num = parseInt(cedula.charAt(i));

if(i % 2 === 0){
num = num * 1;
}else{
num = num * 2;

if(num > 9){
num = Math.floor(num / 10) + (num % 10);
}

}

suma += num;

}

let digito = (10 - (suma % 10)) % 10;

return digito === parseInt(cedula.charAt(10));

}

function mostrarResultado(texto,correcto){

let resultado = document.getElementById("resultado");

resultado.innerHTML = texto;

if(correcto){
resultado.className = "resultado correcta";
}else{
resultado.className = "resultado incorrecta";
}

}

</script>

</body>

</html>
