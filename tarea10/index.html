<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chatbot UASD IA</title>

<link rel="stylesheet" href="estilos.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header>

<div class="logo">

<i class="fa-solid fa-graduation-cap"></i>

Chatbot Estatuto UASD

</div>

</header>


<div class="chat-container">

<div class="chat-box" id="chatBox">

<div class="mensaje bot">

Hola 👋 Soy el asistente inteligente del Estatuto Orgánico de la UASD.
Puedes preguntarme sobre estudiantes, docentes, rectoría, facultades y más.

</div>

</div>

<div class="acciones">

<button onclick="limpiarChat()">

<i class="fa-solid fa-trash"></i>

Limpiar Chat

</button>

</div>
<!-- PREGUNTAS SUGERIDAS -->

<div class="preguntas">

<button onclick="preguntaSugerida(this)">
¿Qué es la UASD?
</button>

<button onclick="preguntaSugerida(this)">
¿Cuáles son los derechos de los estudiantes?
</button>

<button onclick="preguntaSugerida(this)">
¿Qué es el Claustro Mayor?
</button>

<button onclick="preguntaSugerida(this)">
¿Cuáles son las funciones del Rector?
</button>

<button onclick="preguntaSugerida(this)">
¿Qué establece el Estatuto sobre los docentes?
</button>

</div>


<!-- INPUT -->

<div class="input-area">

  <button onclick="limpiarChat()">

Limpiar Chat

</button>

<input
type="text"
id="pregunta"
placeholder="Escribe tu pregunta..."
>

<button onclick="enviarPregunta()">

<i class="fa-solid fa-paper-plane"></i>

</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
