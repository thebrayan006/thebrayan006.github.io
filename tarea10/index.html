<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chatbot UASD Inteligente</title>

<link rel="stylesheet" href="estilos.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

<header>

<h1>

<i class="fa-solid fa-robot"></i>

Chatbot UASD

</h1>

<p>

Consulta el Estatuto Orgánico de la UASD usando Inteligencia Artificial

</p>

</header>


<!-- PREGUNTAS SUGERIDAS -->

<div class="preguntas">

<button onclick="enviarPregunta('¿Qué es la UASD?')">

¿Qué es la UASD?

</button>

<button onclick="enviarPregunta('¿Cuál es la misión de la UASD?')">

Misión UASD

</button>

<button onclick="enviarPregunta('¿Qué es el Claustro Mayor?')">

Claustro Mayor

</button>

<button onclick="enviarPregunta('¿Cuáles son las funciones del Rector?')">

Funciones del Rector

</button>

<button onclick="enviarPregunta('¿Qué establece el Estatuto sobre los estudiantes?')">

Estudiantes

</button>

</div>


<!-- CHAT -->

<div id="chat-box" class="chat-box">

<div class="mensaje bot">

Hola 👋 Soy el asistente inteligente de la UASD.
Hazme preguntas sobre el Estatuto Orgánico.

</div>

</div>


<!-- INPUT -->

<div class="input-area">

<input
type="text"
id="user-input"
placeholder="Escribe tu pregunta..."
>

<button onclick="enviarPregunta()">

<i class="fa-solid fa-paper-plane"></i>

</button>

<button onclick="limpiarChat()">

<i class="fa-solid fa-trash"></i>

</button>

</div>

</div>


<script src="script.js"></script>

</body>

</html>
