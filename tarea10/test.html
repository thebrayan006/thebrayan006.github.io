<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Test Gemini</title>
</head>

<body>

<h1>Prueba Gemini</h1>

<button onclick="probarGemini()">

Probar API

</button>

<pre id="resultado"></pre>

<script>

const API_KEY = "AIzaSyBDHjpa_Nb9lVHPFuSf7ycMfLM2uxlnE-U";


async function probarGemini(){

let resultado =
document.getElementById("resultado");

resultado.innerText = "Probando...";


try{

let response = await fetch(

`https://generativelanguage.googleapis.com/v1beta/models` +

`?key=${API_KEY}`

);


let data = await response.json();

console.log(data);

resultado.innerText =
JSON.stringify(data,null,2);

}catch(error){

resultado.innerText =
"ERROR: " + error;

console.error(error);

}

}

</script>

</body>
