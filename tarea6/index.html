<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menú Dinámico Dashboard</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="header">

<h1>Menú Dinámico</h1>

<div class="hamburger" onclick="toggleMenu()">☰</div>

<nav id="menu"></nav>

</header>


<section class="admin">

<h2>Panel Administrador</h2>

<button onclick="mostrarLogin()">Login</button>

<div id="loginBox" class="hidden">

<input type="text" id="user" placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

</div>


<div id="adminPanel" class="hidden">

<h3>Administrar menú</h3>

<input type="text" id="nombreMenu" placeholder="Nombre">
<input type="text" id="enlaceMenu" placeholder="Enlace">

<button onclick="agregarMenu()">Agregar</button>

<ul id="listaAdmin"></ul>

</div>

</section>


<script src="script.js"></script>

</body>
</html>
