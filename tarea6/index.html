<!DOCTYPE html>
<html>

<head>

<title>Sitio Web Profesional</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Arial;
margin:0;
}

/* NAVBAR */

nav{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* MENU */

nav ul{
list-style:none;
display:flex;
gap:25px;
margin:0;
padding:0;
}

nav li{
color:white;
cursor:pointer;
position:relative;
padding:5px 10px;
}

nav li:hover{
color:#00d4ff;
}

/* SUBMENU OCULTO */

nav ul ul{
display:none;
position:absolute;
top:35px;
left:0;
background:#222;
padding:10px 0;
border-radius:6px;
flex-direction:column;
min-width:160px;
}

/* SUBMENU ITEMS */

nav ul ul li{
padding:10px 15px;
white-space:nowrap;
}

/* MOSTRAR SOLO AL PASAR EL MOUSE */

nav li:hover > ul{
display:block;
}

/* BOTON LOGIN */

#loginBtn{

background:#00d4ff;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;

}

#loginBtn:hover{
background:#009ec2;
}

/* CONTENIDO PRINCIPAL */

#contenido{

padding:60px;
text-align:center;

}

</style>

</head>

<body>

<nav>

<ul id="menu"></ul>

<button id="loginBtn" onclick="window.location.href='login.html'">
Administrador
</button>

</nav>

<div id="contenido">

<h1>Bienvenido a Nuestro Sitio</h1>

<p>
Explora nuestros servicios digitales, diseño web profesional y soluciones de marketing.
</p>

</div>

<script src="script.js"></script>

</body>

</html>
