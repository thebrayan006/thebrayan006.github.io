<!DOCTYPE html>
<html>

<head>

<title>Sitio Web Profesional</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Arial;
margin:0;
}

nav{
background:#111;
padding:15px;
}

nav ul{
list-style:none;
display:flex;
gap:25px;
margin:0;
padding:0;
}

nav li{
color:white;
cursor:pointer;
position:relative;
transition:all .3s;
}

nav li:hover{
transform:translateY(-2px);
}

nav ul ul{
display:none;
position:absolute;
top:30px;
left:0;
background:#222;
padding:10px;
border-radius:6px;
flex-direction:column;
}

nav ul ul ul{
left:150px;
top:0;
}

nav li:hover > ul{
display:flex;
}

nav ul ul li{
padding:8px 15px;
white-space:nowrap;
}

nav ul ul li:hover{
background:#333;
}

#contenido{

padding:40px;

}

</style>

</head>

<body>

<nav>

<ul id="menu"></ul>

</nav>

<div id="contenido">

<h1>Bienvenido</h1>

<p>Seleccione una opción del menú</p>

</div>

<script src="script.js"></script>

</body>

</html>
