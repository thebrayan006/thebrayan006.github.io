<!DOCTYPE html>
<html>

<head>

<title>Mi Sitio Web</title>

<link rel="stylesheet" href="style.css">

<style>

nav ul{
list-style:none;
padding:0;
display:flex;
gap:20px;
background:#111;
padding:15px;
}

nav ul li{
color:white;
position:relative;
cursor:pointer;
}

nav ul li ul{
display:none;
position:absolute;
top:30px;
left:0;
background:#222;
padding:10px;
flex-direction:column;
}

nav ul li:hover ul{
display:block;
}

nav ul li ul li{
padding:8px;
white-space:nowrap;
}

#contenido{
margin-top:40px;
padding:20px;
background:#f4f4f4;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Mi Sitio Web</h1>

<nav>

<ul id="menu"></ul>

</nav>

<div id="contenido">

<h2>Bienvenido</h2>

<p>Seleccione una opción del menú para ver la información.</p>

</div>

<script src="script.js"></script>

</body>

</html>
