<!DOCTYPE html>
<html>

<head>

<title>Sitio Web Profesional</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Arial;
margin:0;
}

nav{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav ul{
list-style:none;
display:flex;
gap:25px;
margin:0;
padding:0;
}

nav li{
color:white;
cursor:pointer;
position:relative;
}

nav li:hover{
color:#00d4ff;
}

nav ul ul{
display:none;
position:absolute;
top:30px;
left:0;
background:#222;
padding:10px;
border-radius:6px;
flex-direction:column;
min-width:150px;
}

nav ul ul ul{
left:150px;
top:0;
}

nav li:hover > ul{
display:block;
}

nav ul ul li{
padding:8px;
}

#loginBtn{

background:#00d4ff;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;

}

#loginBtn:hover{
background:#009ec2;
}

#contenido{
padding:40px;
}

</style>

</head>

<body>

<nav>

<ul id="menu"></ul>

<button id="loginBtn" onclick="window.location.href='login.html'">
Login Administrador
</button>

</nav>

<div id="contenido">

<h1>Bienvenido</h1>

<p>Seleccione una opción del menú</p>

</div>

<script src="script.js"></script>

</body>

</html>
