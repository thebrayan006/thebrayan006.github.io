<!DOCTYPE html>
<html>

<head>

<title>Panel Administrador</title>

<link rel="stylesheet" href="style.css">

<style>

.admin-top{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

button{
padding:8px 12px;
border:none;
background:#0077ff;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#0056b3;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ccc;
}

input,select{
padding:6px;
margin-bottom:10px;
width:200px;
}

</style>

</head>

<body>

<div class="hero">

<div class="admin-top">

<div>
<button onclick="window.location.href='index.html'">
Inicio
</button>
</div>

<div>
<button onclick="cerrarSesion()">
Cerrar Sesión
</button>
</div>

</div>

<h2>Administrador del Menú</h2>

<input id="nombre" placeholder="Nombre del menú"><br>

<input id="contenido" placeholder="Contenido"><br>

<label>¿Tiene Submenú?</label><br>

<select id="submenu">
<option value="no">No</option>
<option value="si">Sí</option>
</select>

<br><br>

<button onclick="agregar()">Agregar</button>

<h3>Opciones del menú</h3>

<table>

<thead>

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Contenido</th>
<th>Submenu</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tablaMenu"></tbody>

</table>

</div>

<script>

let tabla = document.getElementById("tablaMenu")

let menuData = JSON.parse(localStorage.getItem("menuData")) || []

function guardar(){

localStorage.setItem("menuData",JSON.stringify(menuData))

}

function renderTabla(){

tabla.innerHTML=""

menuData.forEach(item=>{

tabla.innerHTML+=`

<tr>

<td>${item.id}</td>

<td>${item.nombre}</td>

<td>${item.contenido}</td>

<td>${item.submenu}</td>

<td>

<button onclick="editar(${item.id})">Editar</button>

<button onclick="eliminar(${item.id})">Eliminar</button>

</td>

</tr>

`

})

}

function agregar(){

let nombre=document.getElementById("nombre").value
let contenido=document.getElementById("contenido").value
let submenu=document.getElementById("submenu").value

if(nombre=="" || contenido==""){

alert("Debes completar los campos")

return

}

let nuevo={

id: Date.now(),
nombre:nombre,
contenido:contenido,
submenu:submenu

}

menuData.push(nuevo)

guardar()

renderTabla()

document.getElementById("nombre").value=""
document.getElementById("contenido").value=""

}

function eliminar(id){

menuData = menuData.filter(item=>item.id!==id)

guardar()

renderTabla()

}

function editar(id){

let item = menuData.find(i=>i.id===id)

let nombre=prompt("Nuevo nombre",item.nombre)
let contenido=prompt("Nuevo contenido",item.contenido)

if(nombre!==null && contenido!==null){

item.nombre=nombre
item.contenido=contenido

guardar()

renderTabla()

}

}

function cerrarSesion(){

localStorage.removeItem("login")

window.location.href="login.html"

}

renderTabla()

</script>

</body>

</html>
