<!DOCTYPE html>
<html>

<head>

<title>Panel Administrador</title>

<link rel="stylesheet" href="style.css">

<style>

.admin-top{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

button{
padding:8px 12px;
border:none;
background:#0077ff;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#0056b3;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ccc;
text-align:center;
}

input{
padding:6px;
margin-bottom:10px;
width:250px;
}

</style>

</head>

<body>

<div class="hero">

<div class="admin-top">

<button onclick="window.location.href='index.html'">
Inicio
</button>

<button onclick="cerrarSesion()">
Cerrar Sesión
</button>

</div>

<h2>Administrador del Menú</h2>

<h3>Crear nuevo menú</h3>

<input id="nombre" placeholder="Nombre del menú"><br>

<input id="contenido" placeholder="Contenido o descripción"><br>

<button onclick="agregar()">Agregar</button>

<h3>Menús existentes</h3>

<table>

<thead>

<tr>

<th>ID</th>
<th>Nombre</th>
<th>Contenido</th>
<th>Submenús</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaMenu"></tbody>

</table>

</div>

<script src="script.js"></script>

<script>

let tabla = document.getElementById("tablaMenu")

function renderTabla(){

tabla.innerHTML=""

menuData.forEach(item=>{

let cantidadSub = item.submenu ? item.submenu.length : 0

tabla.innerHTML += `

<tr>

<td>${item.id}</td>

<td>${item.nombre}</td>

<td>${item.contenido || "-"}</td>

<td>${cantidadSub}</td>

<td>

<button onclick="editar(${item.id})">Editar</button>

<button onclick="eliminar(${item.id})">Eliminar</button>

<button onclick="crearSubmenu(${item.id})">Submenu</button>

</td>

</tr>

`

})

}

function agregar(){

let nombre = document.getElementById("nombre").value
let contenido = document.getElementById("contenido").value

if(nombre===""){
alert("Debes escribir un nombre")
return
}

agregarMenu(nombre,contenido)

renderTabla()

document.getElementById("nombre").value=""
document.getElementById("contenido").value=""

}

function eliminar(id){

if(confirm("¿Eliminar este menú?")){

eliminarMenu(id)

renderTabla()

}

}

function editar(id){

let item = menuData.find(i=>i.id==id)

let nombre = prompt("Nuevo nombre", item.nombre)

let contenido = prompt("Nuevo contenido", item.contenido)

editarMenu(id,nombre,contenido)

renderTabla()

}

function crearSubmenu(id){

let nombre = prompt("Nombre del submenú")

let link = prompt("Página destino (ejemplo: pagina.html)")

if(nombre && link){

agregarSubmenu(id,nombre,link)

renderTabla()

}

}

function cerrarSesion(){

localStorage.removeItem("login")

window.location.href="login.html"

}

renderTabla()

</script>

</body>

</html>
