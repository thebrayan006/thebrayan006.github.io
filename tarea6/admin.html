<!DOCTYPE html>
<html>

<head>

<title>Panel Administrador</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="hero">

<h2>Administrador del Menú</h2>

<input id="nombre" placeholder="Nombre"><br><br>

<input id="enlace" placeholder="Enlace"><br><br>

<button onclick="agregar()">Agregar</button>

<h3>Opciones del menú</h3>

<table border="1">

<thead>

<tr>

<th>ID</th>
<th>Nombre</th>
<th>Enlace</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaMenu"></tbody>

</table>

</div>

<script src="script.js"></script>

<script>

let tabla=document.getElementById("tablaMenu")

function renderTabla(){

tabla.innerHTML=""

menuData.forEach(item=>{

tabla.innerHTML+=`

<tr>

<td>${item.id}</td>

<td>${item.nombre}</td>

<td>${item.enlace}</td>

<td>

<button onclick="editar(${item.id})">Editar</button>

<button onclick="eliminar(${item.id})">Eliminar</button>

</td>

</tr>

`

})

}

function agregar(){

let nombre=document.getElementById("nombre").value
let enlace=document.getElementById("enlace").value

agregarMenu(nombre,enlace)

renderTabla()

}

function eliminar(id){

eliminarMenu(id)

renderTabla()

}

function editar(id){

let nombre=prompt("Nuevo nombre")
let enlace=prompt("Nuevo enlace")

editarMenu(id,nombre,enlace)

renderTabla()

}

setTimeout(()=>{

renderTabla()

},500)

</script>

</body>

</html>
