<!DOCTYPE html>
<html>

<head>

<title>Panel Administrador</title>

<link rel="stylesheet" href="style.css">

<style>

.admin-top{

display:flex;
justify-content:space-between;
margin-bottom:20px;

}

button{
padding:8px 12px;
border:none;
background:#0077ff;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#0056b3;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<div class="hero">

<div class="admin-top">

<div>

<button onclick="window.location.href='index.html'">
Inicio
</button>

</div>

<div>

<button onclick="cerrarSesion()">
Cerrar Sesión
</button>

</div>

</div>

<h2>Administrador del Menú</h2>

<input id="nombre" placeholder="Nombre"><br><br>

<input id="enlace" placeholder="Contenido"><br><br>

<button onclick="agregar()">Agregar</button>

<h3>Opciones del menú</h3>

<table>

<thead>

<tr>

<th>ID</th>
<th>Nombre</th>
<th>Contenido</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaMenu"></tbody>

</table>

</div>

<script src="script.js"></script>

<script>

let tabla=document.getElementById("tablaMenu")

function renderTabla(){

tabla.innerHTML=""

menuData.forEach(item=>{

tabla.innerHTML+=`

<tr>

<td>${item.id}</td>

<td>${item.nombre}</td>

<td>${item.contenido}</td>

<td>

<button onclick="editar(${item.id})">Editar</button>

<button onclick="eliminar(${item.id})">Eliminar</button>

</td>

</tr>

`

})

}

function agregar(){

let nombre=document.getElementById("nombre").value
let enlace=document.getElementById("enlace").value

agregarMenu(nombre,enlace)

renderTabla()

}

function eliminar(id){

eliminarMenu(id)

renderTabla()

}

function editar(id){

let nombre=prompt("Nuevo nombre")
let enlace=prompt("Nuevo contenido")

editarMenu(id,nombre,enlace)

renderTabla()

}

function cerrarSesion(){

localStorage.removeItem("login")

window.location.href="login.html"

}

setTimeout(()=>{

renderTabla()

},300)

</script>

</body>

</html>
